<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowspan</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
<table>

<tr>
    <th colspan="5 ">A</th>
   
</tr>

<tr>
    <td rowspan="2">B</td>
     <td>C</td>
      <td rowspan="4">D</td>
       <td colspan="2">E</td>
</tr>
<tr>
    <td>F</td>
     <td>G</td>
      <td>H</td>
</tr>
<tr>
    <td rowspan="2">H</td>
     <td>J</td>
      <td>K</td>
         <td>L</td>
</tr>
<tr>
 

     <td>M</td>
      <td colspan="2">N</td>
</tr>
</table>

</body>
</html>
